<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Homework Tutor{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  {% if csrf_token %}<meta name="csrf-token" content="{{ csrf_token }}">{% endif %}
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js" defer></script>
</head>
<body>
  <header class="site-header">
    <h1><a href="/">Homework Tutor</a></h1>
    {% if user %}
    <nav class="user-nav">
      <span class="user-tag">{{ user.username }} ({{ user.role }})</span>
      <form method="post" action="/logout" class="inline-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button type="submit" class="link-button">Log out</button>
      </form>
    </nav>
    {% endif %}
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
