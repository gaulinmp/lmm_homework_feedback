{# Renders one transcript row for a single submission. Caller passes `s`. #}
<article class="turn turn-{{ s.grader_verdict }}" data-turn="{{ s.turn_index }}">
  <header class="turn-header">
    <span class="turn-index">Attempt {{ s.turn_index }}</span>
    <span class="turn-verdict verdict-{{ s.grader_verdict }}">{{ s.grader_verdict }}</span>
  </header>
  {% if s.payload_text %}
  <section class="turn-student">
    <h4>You wrote</h4>
    <pre class="turn-text">{{ s.payload_text }}</pre>
  </section>
  {% endif %}
  <section class="turn-grader">
    <h4>Grader</h4>
    <p class="turn-rationale">{{ s.grader_rationale }}</p>
  </section>
  {% if s.tutor_reply_md %}
  <section class="turn-tutor">
    <h4>Tutor</h4>
    <div class="turn-reply">{{ s.tutor_reply_md }}</div>
  </section>
  {% endif %}
</article>
